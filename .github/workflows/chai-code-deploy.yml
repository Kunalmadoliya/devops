name: Deploy Nodejs code on ExCloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Docker Image
        run: |
          docker build -t kunalmadoliya/chaicode-node:latest .
          docker push kunalmadoliya/chaicode-node:latest

      - name: Deploy on ExCloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.128.170
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            sudo docker pull kunalmadoliya/chaicode-node:latest

            sudo docker stop chaicode-node || true
            sudo docker rm chaicode-node || true

            sudo docker run -d \
              --restart unless-stopped \
              --name chaicode-node \
              -p 8000:8000 \
              kunalmadoliya/chaicode-node:latest


              
